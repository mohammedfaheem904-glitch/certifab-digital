<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex" />
    <script>
      // SPA fallback for static hosts that don't honor .htaccess.
      // Preserve the originally requested path + query when redirecting.
      (function () {
        var path = window.location.pathname + window.location.search + window.location.hash;
        window.location.replace("/?spa_redirect=" + encodeURIComponent(path));
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/">home</a>…</p>
  </body>
</html>

name: Build and Deploy to production branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Detect build output directory
        id: outdir
        run: |
          for d in dist build .output/public dist/client; do
            if [ -d "$d" ]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              echo "Found build output at: $d"
              exit 0
            fi
          done
          echo "No build output directory found" >&2
          ls -la
          exit 1

      - name: Verify SPA fallback files are present
        run: |
          test -f "${{ steps.outdir.outputs.dir }}/.htaccess" || { echo "Missing .htaccess in build output"; exit 1; }
          test -f "${{ steps.outdir.outputs.dir }}/_redirects" || { echo "Missing _redirects in build output"; exit 1; }
          test -f "${{ steps.outdir.outputs.dir }}/404.html" || { echo "Missing 404.html in build output"; exit 1; }
          echo "SPA fallback files OK"

      - name: Ensure .nojekyll (preserve dotfiles on gh-pages publish)
        run: touch "${{ steps.outdir.outputs.dir }}/.nojekyll"


      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.outdir.outputs.dir }}
          publish_branch: production
          force_orphan: true
          commit_message: "build: deploy ${{ github.sha }}"

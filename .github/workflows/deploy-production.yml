name: Build and Deploy to production branch

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Detect build output directory
        id: outdir
        run: |
          for d in dist build .output/public dist/client; do
            if [ -d "$d" ]; then
              echo "dir=$d" >> "$GITHUB_OUTPUT"
              echo "Found build output at: $d"
              exit 0
            fi
          done
          echo "No build output directory found" >&2
          ls -la
          exit 1

      - name: Add SPA fallback (.htaccess) for Hostinger
        run: |
          cat > "${{ steps.outdir.outputs.dir }}/.htaccess" <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /index.html [L]
          </IfModule>
          EOF

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.outdir.outputs.dir }}
          publish_branch: production
          force_orphan: true
          commit_message: "build: deploy ${{ github.sha }}"
